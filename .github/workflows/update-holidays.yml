name: Update holidays.json

on:
  workflow_dispatch:        # 수동 실행 버튼
  schedule:
    - cron: "0 0 1 * *"     # 매월 1일 00:00 UTC

permissions:
  contents: write           # 변경분 커밋용

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch holidays
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}   # 저장소 Secrets에 등록
        run: node scripts/fetch_holidays.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain holidays.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add holidays.json
            git commit -m "chore: update holidays.json $(date -u +%Y-%m-%d)"
            git push
          else
            echo "변경 없음"
          fi
